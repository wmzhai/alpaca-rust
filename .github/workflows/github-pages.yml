name: release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ensure-master-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tagged commit is reachable from master
        run: |
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Verify tag matches workspace version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          expected_tag="v$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"

          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "tag ${RELEASE_TAG} does not match workspace version ${expected_tag}" >&2
            exit 1
          fi

  build:
    needs: ensure-master-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Build workspace
        run: cargo build --workspace

      - name: Test semantic and facade crates
        run: |
          cargo test -p alpaca-time
          cargo test -p alpaca-option
          cargo test -p alpaca-facade --test request

      - name: Test doctests
        run: cargo test --doc

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate docs metadata
        run: python3 tools/docs/generate-doc-site

      - name: Test optional workspace packages
        run: pnpm run test:packages

      - name: Typecheck optional workspace packages
        run: pnpm run typecheck:packages

      - name: Copy rustdoc bundle into site static assets
        run: |
          rm -rf website/static/api
          mkdir -p website/static/api
          cp -R target/doc/. website/static/api/

      - name: Build docs site
        run: pnpm run build:website

      - name: Verify publishable package manifests
        run: |
          for crate in alpaca-core alpaca-rest-http alpaca-data alpaca-trade alpaca-mock alpaca-time alpaca-option alpaca-facade; do
            cargo package --list -p "$crate"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CRATES_IO_USER_AGENT: alpaca-rust-release-check (+https://github.com/${{ github.repository }})
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          cargo metadata --no-deps --format-version 1 > /tmp/cargo-metadata.json

          version_for() {
            python3 -c 'import json, sys; crate = sys.argv[1]; meta = json.load(open("/tmp/cargo-metadata.json", encoding="utf-8")); matches = [pkg["version"] for pkg in meta["packages"] if pkg["name"] == crate]; matches or (_ for _ in ()).throw(SystemExit(f"missing package metadata for {crate}")); print(matches[0])' "$1"
          }

          crate_exists() {
            local crate="$1"
            local version="$2"
            curl -sS \
              -A "$CRATES_IO_USER_AGENT" \
              -H 'Accept: application/json' \
              -o /tmp/crates-io-version.json \
              -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${version}"
          }

          for crate in alpaca-core alpaca-rest-http alpaca-data alpaca-trade alpaca-mock alpaca-time alpaca-option alpaca-facade; do
            version="$(version_for "$crate")"
            status="$(crate_exists "$crate" "$version")"
            case "$status" in
              200)
                echo "${crate} ${version} already exists on crates.io, skipping publish."
                continue
                ;;
              404)
                ;;
              *)
                echo "unexpected crates.io status for ${crate} ${version}: ${status}" >&2
                cat /tmp/crates-io-version.json >&2 || true
                exit 1
                ;;
            esac

            cargo publish --dry-run --locked -p "$crate"
            cargo publish -p "$crate" --locked

            for attempt in $(seq 1 30); do
              status="$(crate_exists "$crate" "$version")"
              if [ "$status" = '200' ]; then
                echo "${crate} ${version} is visible on crates.io."
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "timed out waiting for ${crate} ${version} to appear on crates.io" >&2
                exit 1
              fi
              sleep 10
            done
          done

  deploy:
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    needs:
      - publish
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract release notes from CHANGELOG.md
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 -c 'import os; from pathlib import Path; tag = os.environ["RELEASE_TAG"]; lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines(); heading = f"## {tag}"; start = next((i for i, line in enumerate(lines) if line.strip() == heading), None); start is not None or (_ for _ in ()).throw(SystemExit(f"missing changelog section for {tag}")); end = next((i for i in range(start + 1, len(lines)) if lines[i].startswith("## ")), len(lines)); section = "\n".join(lines[start + 1:end]).strip(); section or (_ for _ in ()).throw(SystemExit(f"empty changelog section for {tag}")); Path("release-notes.md").write_text(section + "\n", encoding="utf-8")'

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
